<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ote's Fastify Template</title>
    <meta name="description" content="Ote's Fastify Template starter server.">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .slide-in {
            animation: slideInDown 0.6s ease-out;
        }

        .fade-in {
            animation: fadeIn 0.8s ease-in;
        }
    </style>
</head>

<body class="min-h-screen bg-slate-950 text-slate-100">
    <main class="mx-auto flex min-h-screen max-w-3xl items-center justify-center px-6">
        <section class="text-center">
            <h1 class="slide-in text-4xl font-bold tracking-tight sm:text-5xl">Ote's Fastify Template</h1>
            <p class="fade-in mt-4 text-slate-300">Ready to build your next Fastify project.</p>
            <div class="fade-in mt-8 flex items-center justify-center gap-3">
                <a href="/api/health" class="rounded-lg bg-emerald-500 px-4 py-2 font-semibold text-slate-950 transition hover:bg-emerald-400">API Health</a>
            </div>
        </section>
    </main>
</body>

</html>
